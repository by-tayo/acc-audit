name: Automated Cloud Compliance CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: securityhub-s3-auto-remediation

jobs:
  compliance-pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find . -name "*.json" -print0 | xargs -0 -n1 jq empty

    - name: Validate YAML files
      run: |
        echo "Validating YAML files..."
        pip install yamllint
        yamllint config/cis-conformance-pack.yaml


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::829578223358:role/AWSConfigRole
        aws-region: us-east-1

    - name: Package Lambda function
      run: |
        cd lambda
        zip -r s3-remediation.zip lambda_function.py

    - name: Deploy Lambda remediation
      run: |
        aws lambda update-function-code \
          --function-name $LAMBDA_FUNCTION_NAME \
          --zip-file fileb://lambda/s3-remediation.zip \
          --region $AWS_REGION


    - name: Verify Security Hub
      run: |
        aws securityhub describe-hub --region $AWS_REGION


    - name: Verify CIS Benchmark
      run: |
        aws securityhub get-enabled-standards \
          --region $AWS_REGION | jq '.StandardsSubscriptions[] | .StandardsArn'

    - name: Pipeline completed
      run: echo "Compliance pipeline completed successfully"
